[build]
  publish = "."
  command = "echo 'No build needed'"

[build.processing]
  skip_processing = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = false

[build.processing.images]
  compress = false

[build.environment]
  REACT_APP_API_BASE_URL = "https://lian-traders-api.onrender.com"
  REACT_APP_BACKEND_URL = "https://lian-traders-api.onrender.com"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
